name: Bug report
description: Something isn't working as expected with the Librarium MCP server
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. The MCP server is a thin shim over the Librarium API,
        so both the **MCP version** and the **upstream API version** matter — most
        behaviour bugs originate on the API side. The MCP version is in the startup
        log line: `librarium-mcp version=… listen=… upstream=…`.

  - type: input
    id: mcp_version
    attributes:
      label: MCP server version
      description: From the startup log or `/health`
      placeholder: "e.g. 26.4.0"
    validations:
      required: true

  - type: input
    id: api_version
    attributes:
      label: Upstream API version
      description: The Librarium API the MCP is pointed at
      placeholder: "e.g. 26.4.2"
    validations:
      required: true

  - type: dropdown
    id: client
    attributes:
      label: MCP client
      description: Which app is connecting to this MCP server?
      options:
        - Claude Desktop
        - Claude Code
        - Cursor
        - Other (specify in description)
    validations:
      required: true

  - type: input
    id: client_version
    attributes:
      label: MCP client version
      placeholder: "e.g. Claude Desktop 0.9.2 / Claude Code 1.0.118"
    validations:
      required: false

  - type: dropdown
    id: transport
    attributes:
      label: Transport
      options:
        - HTTP (streamable)
        - stdio
        - SSE
        - Other / unsure
    validations:
      required: true

  - type: input
    id: tool
    attributes:
      label: Affected tool(s)
      description: Which `mcp__librarium__*` tool was being called?
      placeholder: "e.g. mcp__librarium__add_book_by_isbn"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Ask the model to …
        2. The MCP tool call returns …
        3. Expected …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: MCP server logs / tool output
      description: Paste relevant lines from the MCP server log and the tool's response. Redact your access token.
      render: text
    validations:
      required: false
